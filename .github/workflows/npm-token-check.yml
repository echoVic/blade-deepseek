name: Check npm token

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      PACKAGE_NAME: "@blade-ai/orca"
      PACKAGE_VERSION: "0.1.1"
      TEST_TAG: "ci-token-check"
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Verify npm token is configured
        run: test -n "$NODE_AUTH_TOKEN"
      - name: Verify npm identity
        run: npm whoami
      - name: Verify npm write permission with temporary dist-tag
        shell: bash
        run: |
          cleanup() {
            npm dist-tag rm "$PACKAGE_NAME" "$TEST_TAG" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          npm dist-tag add "${PACKAGE_NAME}@${PACKAGE_VERSION}" "$TEST_TAG"
          npm dist-tag ls "$PACKAGE_NAME"
          npm dist-tag rm "$PACKAGE_NAME" "$TEST_TAG"
