name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate, without leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install test runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Run tests
        env:
          RUST_BACKTRACE: "1"
        run: cargo test -- --test-threads=1

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${DISPATCH_VERSION}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version '$version' is not a valid semver release version" >&2
            exit 1
          fi

          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          if [[ "$version" != "$cargo_version" ]]; then
            echo "Release version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    needs: [test, version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p "dist/orca-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/orca" "dist/orca-${{ matrix.target }}/orca"
          tar -C "dist/orca-${{ matrix.target }}" -czf "dist/orca-${{ matrix.target }}.tar.gz" orca
          shasum -a 256 "dist/orca-${{ matrix.target }}.tar.gz" > "dist/orca-${{ matrix.target }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: orca-${{ matrix.target }}
          path: |
            dist/orca-${{ matrix.target }}/orca
            dist/orca-${{ matrix.target }}.tar.gz
            dist/orca-${{ matrix.target }}.tar.gz.sha256

  release:
    if: github.ref_type == 'tag'
    needs: [build, version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist/release
          find dist/artifacts -name '*.tar.gz' -exec cp {} dist/release/ \;
          find dist/artifacts -name '*.sha256' -exec cp {} dist/release/ \;
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orca ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/release/*

  npm:
    if: github.ref_type == 'tag'
    needs: [build, version, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          merge-multiple: true
      - name: Stage npm packages
        run: |
          node scripts/release/stage-npm.mjs \
            --version "${{ needs.version.outputs.version }}" \
            --artifacts-dir dist/artifacts \
            --out-dir dist/npm \
            --pack
      - name: Smoke current platform npm package
        run: |
          node scripts/release/smoke-npm.mjs \
            --version "${{ needs.version.outputs.version }}" \
            --stage-dir dist/npm/stage \
            --tarballs-dir dist/npm/tarballs
      - name: Upload npm tarballs artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: dist/npm/tarballs/*.tgz
      - name: Publish npm packages
        id: publish
        if: env.NODE_AUTH_TOKEN != ''
        shell: bash
        run: |
          for package_dir in dist/npm/stage/orca-darwin-arm64 dist/npm/stage/orca-darwin-x64 dist/npm/stage/orca-linux-arm64 dist/npm/stage/orca-linux-x64 dist/npm/stage/orca; do
            name="$(node -e "console.log(require('./${package_dir}/package.json').name)")"
            version="$(node -e "console.log(require('./${package_dir}/package.json').version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published; skipping"
            else
              tag="latest"
              if [[ "$version" == *-* ]]; then
                tag="native"
              fi
              npm publish "$package_dir" --access public --tag "$tag"
            fi
          done
      - name: Skip npm publish without token
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN is not configured; npm publish skipped."
      - name: Verify published release
        if: env.NODE_AUTH_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/release/verify-published.mjs \
            --version "${{ needs.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --package "@blade-ai/orca" \
            --bin "orca"

  npm-release-assets:
    if: ${{ always() && github.ref_type == 'tag' && needs.npm.result != 'cancelled' && needs.npm.result != 'skipped' }}
    needs: [npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: dist/npm/tarballs
      - name: Upload npm tarballs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/npm/tarballs/*.tgz
