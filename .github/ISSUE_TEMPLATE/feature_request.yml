name: Feature request
description: Propose an improvement or new capability for Orca
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the problem or limitation this feature would address.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Explain the concrete workflow and who benefits from it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior or interface you are proposing.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: affected_surfaces
    attributes:
      label: Primary affected surface
      description: Select the main surface this proposal would affect.
      options:
        - TUI
        - orca exec
        - embedded server
        - tools/MCP
        - subagents/workflows
        - history/persistence
        - other
    validations:
      required: true
  - type: checkboxes
    id: additional_surfaces
    attributes:
      label: Additional affected surfaces
      description: Select any other surfaces this proposal may affect.
      options:
        - label: TUI
        - label: orca exec
        - label: embedded server
        - label: tools/MCP
        - label: subagents/workflows
        - label: history/persistence
        - label: other
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note any protocol, persistence, security, or dependency impact.
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution expectations
      options:
        - label: I have removed secrets and sensitive data from this request.
          required: true
        - label: I will wait for maintainer alignment before implementing large or compatibility-sensitive changes.
          required: true
